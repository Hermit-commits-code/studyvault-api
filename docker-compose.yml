services:
  api:
    build: .
    container_name: studyvault-api

    expose:
      - "8000"

    volumes:
      - ./notes:/app/notes
      - ./transcripts:/app/transcripts

    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    container_name: studyvault-nginx

    ports:
      - "8080:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - api

    restart: unless-stopped
